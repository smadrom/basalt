services:
  db:
    image: postgres:17-alpine
    container_name: basalt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: basalt
      POSTGRES_PASSWORD: basalt
      POSTGRES_DB: basalt
    ports:
      - "5432:5432"
    volumes:
      - basalt-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basalt -d basalt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  basalt-db-data:
